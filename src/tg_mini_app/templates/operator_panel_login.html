<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root {
        --bg: #121218;
        --card: #1c1c26;
        --text: #eee;
        --muted: #9a9aa8;
        --accent: #e6b422;
        --border: #2a2a36;
        --danger: #e05555;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        line-height: 1.45;
      }
      .wrap {
        max-width: 420px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      h1 {
        font-size: 1.2rem;
        margin: 0 0 8px;
      }
      p.hint {
        color: var(--muted);
        font-size: 13px;
        margin: 0 0 20px;
      }
      .err {
        background: rgba(224, 85, 85, 0.15);
        color: var(--danger);
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-size: 15px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        cursor: pointer;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        font-size: 15px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Панель оператора</h1>
      <p class="hint">
        Введите пароль из <code>OPERATOR_PANEL_TOKEN</code> в .env (тот же, что для
        HTTP Basic, логин <code>operator</code>).
      </p>
      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}
      <form method="post" action="/operator-panel/login" autocomplete="current-password">
        <label for="password">Пароль</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          autofocus
        />
        <button type="submit">Войти</button>
      </form>
    </div>
  </body>
</html>
